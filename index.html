<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designer Picker</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      user-select: none;
      height: 100vh;
      width: 100vw;
    }

    /* ── Stage ── */
    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    #stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── Cursors ── */
    .cursor-wrap {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      will-change: transform;
    }

    .cursor-svg { display: block; }

    .cursor-label {
      position: absolute;
      top: 22px;
      left: 14px;
      padding: 3px 9px 3px 8px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      letter-spacing: 0.2px;
      line-height: 1.6;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cursor-avatar {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 800;
      color: white;
    }

    .cursor-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Top bar ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: rgba(15,15,26,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 40;
    }

    #topbar h1 {
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    #status-text {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }

    /* ── Controls ── */
    #controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 14px 20px 18px;
      background: rgba(15,15,26,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 40;
    }

    #pool-display {
      flex: 1;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pool-chip {
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.4s ease;
      letter-spacing: 0.2px;
    }

    .pool-chip.available {
      border: 1px solid;
    }

    .pool-chip.picked {
      background: rgba(255,255,255,0.06) !important;
      color: rgba(255,255,255,0.25) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      text-decoration: line-through;
    }

    .btn-group { display: flex; gap: 8px; flex-shrink: 0; }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.2px;
    }

    .btn:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.1); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #start-btn {
      background: linear-gradient(135deg, #6C63FF, #9B59B6);
      color: white;
      box-shadow: 0 4px 14px rgba(108,99,255,0.4);
    }

    #reset-btn {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.65);
    }

    /* ── Reveal overlay ── */
    #reveal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
      transition: background 0.6s ease;
    }

    #reveal.visible {
      background: rgba(0,0,0,0.88);
      pointer-events: all;
    }

    .reveal-card {
      text-align: center;
      transform: scale(0.6);
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
    }

    #reveal.visible .reveal-card {
      transform: scale(1);
      opacity: 1;
    }

    .reveal-eyebrow {
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* ── Duo layout ── */
    .reveal-duo {
      display: flex;
      gap: 40px;
      align-items: flex-start;
      justify-content: center;
      margin-bottom: 32px;
    }

    .reveal-person {
      text-align: center;
      min-width: 150px;
    }

    .reveal-connector {
      font-size: 28px;
      font-weight: 300;
      color: rgba(255,255,255,0.2);
      align-self: center;
      padding-bottom: 20px;
      flex-shrink: 0;
    }

    .reveal-avatar-ring {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      margin: 0 auto 14px;
      border: 3px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .reveal-avatar-ring::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--ring-color), transparent 60%, var(--ring-color));
      animation: spin-ring 2s linear infinite;
      z-index: -1;
    }

    @keyframes spin-ring {
      to { transform: rotate(360deg); }
    }

    .reveal-avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 800;
      color: white;
      position: relative;
    }

    .reveal-avatar-inner img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .reveal-avatar-initials {
      position: relative;
      z-index: 1;
    }

    .reveal-name {
      font-size: 22px;
      font-weight: 800;
      color: white;
      margin-bottom: 5px;
      line-height: 1.2;
    }

    .reveal-title-role {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      line-height: 1.4;
    }

    .reveal-done-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 11px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .reveal-done-btn:hover { background: rgba(255,255,255,0.18); transform: translateY(-1px); }

    /* ── Full rotation overlay ── */
    #full-rotation {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a0a40 0%, #0f0f1a 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #full-rotation.visible {
      opacity: 1;
      pointer-events: all;
    }

    .fr-emoji {
      font-size: 72px;
      margin-bottom: 20px;
      display: block;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .fr-title {
      font-size: 32px;
      font-weight: 800;
      color: white;
      margin-bottom: 10px;
    }

    .fr-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 36px;
    }

    .fr-btn {
      background: linear-gradient(135deg, #6C63FF, #9B59B6);
      color: white;
      border: none;
      padding: 13px 32px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 20px rgba(108,99,255,0.5);
    }

    .fr-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 150;
      border-radius: 2px;
    }

    /* ── Winner glow ── */
    .cursor-wrap.winner-glow .cursor-svg path {
      filter: drop-shadow(0 0 8px currentColor);
    }
  </style>
</head>
<body>

<div id="stage"></div>

<div id="topbar">
  <h1>Designer Picker</h1>
  <span id="status-text">Ready</span>
</div>

<div id="reveal">
  <div class="reveal-card">
    <div class="reveal-eyebrow">Up next to present&hellip;</div>
    <div class="reveal-duo" id="reveal-duo"></div>
    <button class="reveal-done-btn" id="reveal-done">Done &rarr;</button>
  </div>
</div>

<div id="full-rotation">
  <span class="fr-emoji">🎉</span>
  <div class="fr-title">Full Rotation Complete!</div>
  <div class="fr-sub">Everyone's had a turn. The pool resets now.</div>
  <button class="fr-btn" onclick="resetRotation()">Start Fresh Rotation</button>
</div>

<div id="controls">
  <div id="pool-display"></div>
  <div class="btn-group">
    <button class="btn" id="start-btn" onclick="startPicking()">🎲 Who's up next?</button>
    <button class="btn" id="reset-btn" onclick="confirmReset()">Reset</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// DESIGNER DATA
// ─────────────────────────────────────────────────────────────
const DESIGNERS = [

  },
  {

    photo: 'https://ca.slack-edge.com/T024JQKAH/U05RH94V475/photo_512.jpg'
  },
  {

    initials: 'BM', color: '#1BC47D',

  {

  },
  {

    initials: 'CC', color: '#1ABCFE',

];

// ─────────────────────────────────────────────────────────────
// STATE & STORAGE
// ─────────────────────────────────────────────────────────────
const STORAGE_KEY = 'designer-picker-v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { picked: [] };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
}

let appState = loadState();
let isRunning = false;
let rafId = null;

// ─────────────────────────────────────────────────────────────
// CURSOR CLASS
// ─────────────────────────────────────────────────────────────
const CURSOR_PATH = 'M1.5,1.5 L1.5,21 L5.8,16.6 L9,24.5 L12,23 L8.8,15 L14.5,15 Z';

class DesignerCursor {
  constructor(designer, mode) {
    // mode: 'active' (running) | 'ghost' (already picked) | 'idle' (between rounds)
    this.d = designer;
    this.mode = mode;

    // Position
    this.x = 100 + Math.random() * (window.innerWidth - 200);
    this.y = 100 + Math.random() * (window.innerHeight - 260);

    // Physics
    this.vx = (Math.random() - 0.5) * 6;
    this.vy = (Math.random() - 0.5) * 6;
    this.ax = 0;
    this.ay = 0;

    // Organic wave params (each cursor unique)
    this.w1 = { freq: 0.018 + Math.random() * 0.022, phase: Math.random() * Math.PI * 2 };
    this.w2 = { freq: 0.013 + Math.random() * 0.018, phase: Math.random() * Math.PI * 2 };
    this.w3 = { freq: 0.025 + Math.random() * 0.012, phase: Math.random() * Math.PI * 2 };

    this.speedMult = 1;
    this.tick = Math.floor(Math.random() * 1000);

    // Elimination
    this.elimState = null; // null | {startTs, duration}
    this.eliminated = false;

    // DOM
    this.el = null;
  }

  build() {
    const wrap = document.createElement('div');
    wrap.className = 'cursor-wrap';

    // SVG cursor
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', '22');
    svg.setAttribute('height', '28');
    svg.setAttribute('viewBox', '0 0 16 27');
    svg.classList.add('cursor-svg');

    const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    shadow.setAttribute('d', CURSOR_PATH);
    shadow.setAttribute('fill', 'rgba(0,0,0,0.35)');
    shadow.setAttribute('transform', 'translate(1,1)');

    const body = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    body.setAttribute('d', CURSOR_PATH);
    body.setAttribute('fill', this.d.color);
    body.setAttribute('stroke', 'white');
    body.setAttribute('stroke-width', '1.2');
    body.setAttribute('stroke-linejoin', 'round');

    svg.appendChild(shadow);
    svg.appendChild(body);

    // Label
    const label = document.createElement('div');
    label.className = 'cursor-label';
    label.style.background = this.d.color;

    // Mini avatar in label
    const av = document.createElement('div');
    av.className = 'cursor-avatar';
    av.style.background = this.d.color;
    av.style.border = '1.5px solid rgba(255,255,255,0.5)';

    const avImg = document.createElement('img');
    avImg.src = this.d.photo || '';
    avImg.alt = '';
    avImg.onerror = () => {
      avImg.style.display = 'none';
      av.textContent = this.d.initials;
    };
    if (!this.d.photo) {
      avImg.style.display = 'none';
      av.textContent = this.d.initials;
    }
    av.appendChild(avImg);

    const nameSpan = document.createElement('span');
    nameSpan.textContent = this.d.name;

    label.appendChild(av);
    label.appendChild(nameSpan);

    wrap.appendChild(svg);
    wrap.appendChild(label);

    this.el = wrap;
    this.applyModeStyle();
    this.el.style.transform = `translate(${this.x}px, ${this.y}px)`;
    return wrap;
  }

  applyModeStyle() {
    if (!this.el) return;
    if (this.mode === 'ghost') {
      this.el.style.opacity = '0.15';
      this.el.style.filter = 'grayscale(1)';
    } else {
      this.el.style.opacity = '1';
      this.el.style.filter = 'none';
    }
  }

  update(ts) {
    if (this.eliminated || this.mode === 'ghost') return;

    this.tick++;

    if (this.elimState) {
      // Elimination animation
      const prog = Math.min((ts - this.elimState.startTs) / this.elimState.duration, 1);
      const shake = Math.sin(prog * 50) * 7 * Math.pow(1 - prog, 1.5);
      this.x += shake;
      this.vx *= 0.88;
      this.vy *= 0.88;
      this.x += this.vx;
      this.y += this.vy;
      this.el.style.opacity = String(1 - prog);
      if (prog >= 1) {
        this.eliminated = true;
        this.el.style.display = 'none';
      }
      return;
    }

    // Organic acceleration from layered sine waves
    const ax = Math.sin(this.tick * this.w1.freq + this.w1.phase) * 0.9
             + Math.sin(this.tick * this.w3.freq + this.w3.phase) * 0.35;
    const ay = Math.cos(this.tick * this.w2.freq + this.w2.phase) * 0.9
             + Math.cos(this.tick * this.w3.freq + this.w3.phase) * 0.35;

    this.vx += ax * 0.18 * this.speedMult;
    this.vy += ay * 0.18 * this.speedMult;

    // Random impulse (sudden direction change)
    if (Math.random() < 0.007) {
      const angle = Math.random() * Math.PI * 2;
      const mag = (2 + Math.random() * 4) * this.speedMult;
      this.vx += Math.cos(angle) * mag;
      this.vy += Math.sin(angle) * mag;
    }

    // Drag
    this.vx *= 0.955;
    this.vy *= 0.955;

    // Speed cap
    const spd = Math.hypot(this.vx, this.vy);
    const maxSpd = 7 * this.speedMult;
    if (spd > maxSpd) { this.vx = (this.vx / spd) * maxSpd; this.vy = (this.vy / spd) * maxSpd; }

    this.x += this.vx;
    this.y += this.vy;

    // Boundary bounce
    const pad = 55;
    const bw = window.innerWidth - pad;
    const bh = window.innerHeight - 165;
    if (this.x < pad) { this.x = pad; this.vx = Math.abs(this.vx) * 1.2; }
    if (this.x > bw) { this.x = bw; this.vx = -Math.abs(this.vx) * 1.2; }
    if (this.y < pad + 48) { this.y = pad + 48; this.vy = Math.abs(this.vy) * 1.2; }
    if (this.y > bh) { this.y = bh; this.vy = -Math.abs(this.vy) * 1.2; }
  }

  render() {
    if (this.eliminated || this.mode === 'ghost') return;
    this.el.style.transform = `translate(${this.x}px, ${this.y}px)`;
  }

  eliminate(ts, duration = 1300) {
    this.elimState = { startTs: ts, duration };
  }

  winnersGlow() {
    if (!this.el) return;
    this.el.classList.add('winner-glow');
    // Pulse the label
    this.el.querySelector('.cursor-label').style.boxShadow =
      `0 0 18px ${this.d.color}bb`;
  }
}

// ─────────────────────────────────────────────────────────────
// POOL DISPLAY
// ─────────────────────────────────────────────────────────────
function renderPool() {
  const el = document.getElementById('pool-display');
  el.innerHTML = '';
  DESIGNERS.forEach(d => {
    const chip = document.createElement('div');
    chip.className = 'pool-chip ' + (appState.picked.includes(d.id) ? 'picked' : 'available');
    chip.textContent = d.name.split(' ')[0];
    if (!appState.picked.includes(d.id)) {
      chip.style.color = d.color;
      chip.style.background = d.color + '22';
      chip.style.borderColor = d.color + '55';
    }
    el.appendChild(chip);
  });

  const available = DESIGNERS.filter(d => !appState.picked.includes(d.id));
  document.getElementById('status-text').textContent =
    available.length === 0
      ? 'Full rotation complete 🎉'
      : `${available.length} of ${DESIGNERS.length} available`;
}

// ─────────────────────────────────────────────────────────────
// IDLE STAGE — scattered frozen cursors
// ─────────────────────────────────────────────────────────────
let idleCursors = [];

function renderIdleStage() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  idleCursors = [];

  const total = DESIGNERS.length;
  DESIGNERS.forEach((d, i) => {
    const isPicked = appState.picked.includes(d.id);
    const angle = (i / total) * Math.PI * 2 - Math.PI / 2;
    const rx = (window.innerWidth * 0.38);
    const ry = (window.innerHeight * 0.28);
    const cx = window.innerWidth / 2 + Math.cos(angle) * rx;
    const cy = window.innerHeight / 2 + Math.sin(angle) * ry;

    const c = new DesignerCursor(d, isPicked ? 'ghost' : 'idle');
    c.x = cx + (Math.random() - 0.5) * 30;
    c.y = cy + (Math.random() - 0.5) * 20;
    c.eliminated = true; // prevent update()
    const el = c.build();
    el.style.transform = `translate(${c.x}px, ${c.y}px)`;
    stage.appendChild(el);
    idleCursors.push(c);
  });
}

// ─────────────────────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────────────────────
let liveCursors = [];

function loop(ts) {
  liveCursors.forEach(c => { c.update(ts); c.render(); });
  rafId = requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────────────────────
// START PICKING
// ─────────────────────────────────────────────────────────────
function startPicking() {
  if (isRunning) return;

  const available = DESIGNERS.filter(d => !appState.picked.includes(d.id));
  if (available.length === 0) {
    document.getElementById('full-rotation').classList.add('visible');
    return;
  }

  isRunning = true;
  document.getElementById('start-btn').disabled = true;
  document.getElementById('status-text').textContent = 'Choosing…';

  // Pick 2 winners (or 1 if only 1 available)
  const winCount = Math.min(2, available.length);
  const shuffled = [...available].sort(() => Math.random() - 0.5);
  const winners = shuffled.slice(0, winCount);
  const winnerIds = new Set(winners.map(w => w.id));
  const losers = available.filter(d => !winnerIds.has(d.id));
  const shuffledLosers = [...losers].sort(() => Math.random() - 0.5);

  // Build stage
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  liveCursors = [];

  DESIGNERS.forEach(d => {
    const isPicked = appState.picked.includes(d.id);
    const mode = isPicked ? 'ghost' : 'active';
    const c = new DesignerCursor(d, mode);

    if (isPicked) {
      // Place ghost cursors around the perimeter
      const idx = DESIGNERS.indexOf(d);
      const angle = (idx / DESIGNERS.length) * Math.PI * 2;
      c.x = window.innerWidth / 2 + Math.cos(angle) * window.innerWidth * 0.42;
      c.y = (window.innerHeight / 2) + Math.sin(angle) * window.innerHeight * 0.32;
      c.eliminated = true;
    } else {
      c.speedMult = 1.4;
    }

    const el = c.build();
    if (isPicked) el.style.transform = `translate(${c.x}px, ${c.y}px)`;
    stage.appendChild(el);
    liveCursors.push(c);
  });

  rafId = requestAnimationFrame(loop);

  // Schedule eliminations — stop when winCount cursors remain
  const CHAOS_MS = 2800;
  const ELIM_INTERVAL = 520;

  shuffledLosers.forEach((d, i) => {
    setTimeout(() => {
      const cursor = liveCursors.find(c => c.d.id === d.id);
      if (cursor) requestAnimationFrame(ts => cursor.eliminate(ts));
      const remaining = available.length - 1 - i;
      document.getElementById('status-text').textContent =
        remaining <= winCount ? 'And the presenters are…' : `${remaining} remaining…`;
    }, CHAOS_MS + i * ELIM_INTERVAL);
  });

  // Winners glow
  const winTime = CHAOS_MS + shuffledLosers.length * ELIM_INTERVAL + 800;
  setTimeout(() => {
    winners.forEach(w => {
      const c = liveCursors.find(c => c.d.id === w.id);
      if (c) c.winnersGlow();
    });
  }, winTime);

  // Reveal
  setTimeout(() => {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    winners.forEach(w => appState.picked.push(w.id));
    saveState();
    renderPool();
    showReveal(winners);
  }, winTime + 700);
}

// ─────────────────────────────────────────────────────────────
// REVEAL
// ─────────────────────────────────────────────────────────────
function buildPersonCard(designer) {
  const person = document.createElement('div');
  person.className = 'reveal-person';

  // Spinning color ring
  const ring = document.createElement('div');
  ring.className = 'reveal-avatar-ring';
  ring.style.setProperty('--ring-color', designer.color);

  const inner = document.createElement('div');
  inner.className = 'reveal-avatar-inner';
  inner.style.background = designer.color;

  const img = document.createElement('img');
  img.alt = '';
  img.style.display = designer.photo ? 'block' : 'none';
  if (designer.photo) {
    img.src = designer.photo;
    img.onerror = () => { img.style.display = 'none'; initials.textContent = designer.initials; };
  }

  const initials = document.createElement('span');
  initials.className = 'reveal-avatar-initials';
  initials.textContent = designer.photo ? '' : designer.initials;

  inner.appendChild(img);
  inner.appendChild(initials);
  ring.appendChild(inner);

  const nameEl = document.createElement('div');
  nameEl.className = 'reveal-name';
  nameEl.textContent = designer.name;
  nameEl.style.color = designer.color;

  person.appendChild(ring);
  person.appendChild(nameEl);
  return person;
}

function showReveal(designers) {
  const revealEl = document.getElementById('reveal');
  const duo = document.getElementById('reveal-duo');
  duo.innerHTML = '';

  if (designers.length === 1) {
    duo.appendChild(buildPersonCard(designers[0]));
  } else {
    duo.appendChild(buildPersonCard(designers[0]));
    const connector = document.createElement('div');
    connector.className = 'reveal-connector';
    connector.textContent = '&';
    duo.appendChild(connector);
    duo.appendChild(buildPersonCard(designers[1]));
  }

  revealEl.classList.add('visible');
  designers.forEach(d => spawnConfetti(d.color));

  document.getElementById('reveal-done').onclick = () => {
    revealEl.classList.remove('visible');
    isRunning = false;
    document.getElementById('start-btn').disabled = false;
    renderIdleStage();

    const remaining = DESIGNERS.filter(d => !appState.picked.includes(d.id)).length;
    document.getElementById('status-text').textContent =
      remaining === 0 ? 'Full rotation complete 🎉' : `${remaining} of ${DESIGNERS.length} available`;

    if (remaining === 0) {
      setTimeout(() => {
        document.getElementById('full-rotation').classList.add('visible');
      }, 600);
    }
  };
}

// ─────────────────────────────────────────────────────────────
// CONFETTI
// ─────────────────────────────────────────────────────────────
function spawnConfetti(primaryColor) {
  const colors = [primaryColor, '#fff', '#FFD93D', '#FF6B6B', '#4ECDC4', '#A8E6CF'];
  const count = 80;

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const size = 5 + Math.random() * 8;
    const isCircle = Math.random() > 0.5;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const startX = 20 + Math.random() * 60; // vw
    const startY = 20 + Math.random() * 40; // vh
    const angle = (Math.random() - 0.5) * 720;
    const endX = (Math.random() - 0.5) * 400;
    const endY = 200 + Math.random() * 300;
    const dur = 0.9 + Math.random() * 0.8;
    const delay = Math.random() * 0.3;

    p.style.cssText = `
      width: ${size}px;
      height: ${isCircle ? size : size * 0.4}px;
      border-radius: ${isCircle ? '50%' : '2px'};
      background: ${color};
      left: ${startX}vw;
      top: ${startY}vh;
      animation: confettiFly ${dur}s ${delay}s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
      --ex: ${endX}px;
      --ey: ${endY}px;
      --rot: ${angle}deg;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), (dur + delay + 0.2) * 1000);
  }
}

// Inject confetti keyframes
const kfStyle = document.createElement('style');
kfStyle.textContent = `
  @keyframes confettiFly {
    from { transform: translate(0,0) rotate(0deg); opacity: 1; }
    to   { transform: translate(var(--ex), var(--ey)) rotate(var(--rot)); opacity: 0; }
  }
`;
document.head.appendChild(kfStyle);

// ─────────────────────────────────────────────────────────────
// RESET
// ─────────────────────────────────────────────────────────────
function confirmReset() {
  if (isRunning) return;
  if (!confirm('Reset the rotation? All designers become available again.')) return;
  resetRotation();
}

function resetRotation() {
  document.getElementById('full-rotation').classList.remove('visible');
  appState = { picked: [] };
  saveState();
  isRunning = false;
  document.getElementById('start-btn').disabled = false;
  renderPool();
  renderIdleStage();
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
function init() {
  renderPool();
  renderIdleStage();

  // If everyone already picked, show completion
  const available = DESIGNERS.filter(d => !appState.picked.includes(d.id));
  if (available.length === 0) {
    document.getElementById('status-text').textContent = 'Full rotation complete 🎉';
  }
}

window.addEventListener('resize', () => {
  if (!isRunning) renderIdleStage();
});

init();
</script>
